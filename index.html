async function hsSync(action, payload) {
  try {
    const res = await fetch('/api/hubspot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...payload }),
    });
    const data = await res.json();
    if (!data.success) console.warn('HubSpot sync issue:', data.error);
    return data;
  } catch (e) {
    console.warn('HubSpot sync failed (non-critical):', e.message);
    return null;
  }
}

async function hsPull(pod) {
  try {
    const res = await fetch('/api/hubspot-accounts?pod=' + encodeURIComponent(pod || 'Pod 3'));
    if (!res.ok) return null;
    return await res.json();
  } catch(e) {
    console.warn('HubSpot pull failed, using local data:', e.message);
    return null;
  }
}

// ── SVG CHARTS ────────────────────────────────────────────────────────────────
function LineChartSVG({data,color,ht}){
  const W=380,H=ht||130,p={t:8,r:8,b:22,l:28};
  const iw=W-p.l-p.r,ih=H-p.t-p.b;
  const mn=Math.min(...data.map(d=>d.v))-2,mx=Math.max(...data.map(d=>d.v))+2;
  const px=i=>p.l+i*(iw/(data.length-1));
  const py=v=>p.t+ih-(((v-mn)/(mx-mn))*ih);
  const pts=data.map((d,i)=>px(i)+','+py(d.v)).join(' ');
  const fill=pts+' '+px(data.length-1)+','+(p.t+ih)+' '+p.l+','+(p.t+ih);
  const gid='g'+color.replace(/[^a-z0-9]/gi,'');
  return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:H},xmlns:'http://www.w3.org/2000/svg'},
    h('defs',null,h('linearGradient',{id:gid,x1:'0',y1:'0',x2:'0',y2:'1'},
      h('stop',{offset:'0%',stopColor:color,stopOpacity:'0.22'}),
      h('stop',{offset:'100%',stopColor:color,stopOpacity:'0'})
    )),
    [0,1,2].map(i=>h('line',{key:i,x1:p.l,y1:p.t+ih*(i/2),x2:W-p.r,y2:p.t+ih*(i/2),stroke:'#252733',strokeWidth:'0.5',strokeDasharray:'4'})),
    h('polygon',{points:fill,fill:'url(#'+gid+')'}),
    h('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:'2'}),
    data.map((d,i)=>h('text',{key:i,x:px(i),y:H-5,textAnchor:'middle',fill:'#7B7F99',fontSize:'9.5'},d.m||d.l))
  );
}
function BarChartSVG({data,colors,ht}){
  const W=380,H=ht||130,p={t:8,r:8,b:22,l:28};
  const iw=W-p.l-p.r,ih=H-p.t-p.b;
  const mx=Math.max(...data.map(d=>d.v),1);
  const slot=iw/data.length,bw=Math.max(6,slot*0.55);
  return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:H},xmlns:'http://www.w3.org/2000/svg'},
    [0,1,2].map(i=>h('line',{key:i,x1:p.l,y1:p.t+ih*(i/2),x2:W-p.r,y2:p.t+ih*(i/2),stroke:'#252733',strokeWidth:'0.5',strokeDasharray:'4'})),
    data.map((d,i)=>{
      const bh=Math.max(2,(d.v/mx)*ih);
      const x=p.l+slot*i+(slot-bw)/2;
      return h(Fragment,{key:i},
        h('rect',{x,y:p.t+ih-bh,width:bw,height:bh,fill:colors?colors[i%colors.length]:'#4F7EFF',opacity:'0.85',rx:'3'}),
        h('text',{x:x+bw/2,y:H-5,textAnchor:'middle',fill:'#7B7F99',fontSize:'9'},d.l||d.m||'')
      );
    })
  );
}

// ── QA TASKS ──────────────────────────────────────────────────────────────────
function QATasks({onToast}){
  const [acctFilter,setAcctFilter]=useState('');
  const [toast2,setToast2]=useState(null);
  const [tasks,setTasks]=useState(()=>{
    const t=[];
    getAccounts().filter(a=>a.status==='Active').forEach(a=>{
      const tmpl=QA_TEMPLATES[a.industry]||QA_TEMPLATES.Default;
      tmpl.forEach((task,i)=>t.push({id:a.id+'-'+i,acct:a.id,task,status:'Pending',due:'Today',priority:i<2?'High':'Medium'}));
    });
    return t;
  });

  const filtered=acctFilter?tasks.filter(t=>t.acct===parseInt(acctFilter)):tasks;
  const complete=id=>setTasks(p=>p.map(t=>t.id===id?{...t,status:'Complete'}:t));
  const grouped={};
  filtered.forEach(t=>{if(!grouped[t.acct])grouped[t.acct]=[];grouped[t.acct].push(t);});

  return h(Fragment,null,
    toast2&&h(Toast,{msg:toast2,onDone:()=>setToast2(null)}),
    h('div',{className:'filter-bar'},
      h(AccountFilter,{value:acctFilter,onChange:setAcctFilter}),
      h('div',{style:{marginLeft:'auto',display:'flex',gap:8}},
        h('div',{className:'stat-card',style:{padding:'6px 14px',flexDirection:'row',alignItems:'center',gap:8}},
          h('span',{style:{fontSize:11,color:'var(--red)',fontWeight:700}},filtered.filter(t=>t.status==='Pending'&&t.priority==='High').length+' High Priority'),
          h('span',{style:{fontSize:11,color:'var(--muted)'}},'·'),
          h('span',{style:{fontSize:11,color:'var(--green)',fontWeight:700}},filtered.filter(t=>t.status==='Complete').length+' Complete')
        )
      )
    ),
    Object.entries(grouped).map(([aid,items])=>{
      const acct=getAccounts().find(a=>a.id===parseInt(aid));
      return h('div',{key:aid,className:'card',style:{marginBottom:14,padding:0}},
        h('div',{style:{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}},
          h('div',{style:{fontWeight:700,fontSize:13}},acct?acct.name:''),
          h(Tag,{t:acct?acct.industry:''}),
          h('div',{style:{marginLeft:'auto',fontSize:11,color:'var(--muted)'}},items.filter(t=>t.status==='Complete').length+'/'+items.length+' complete')
        ),
        h('table',{className:'tbl'},
          h('thead',null,h('tr',null,['Task','Priority','Status','Due',''].map(c=>h('th',{key:c},c)))),
          h('tbody',null,items.map(t=>h('tr',{key:t.id},
            h('td',{style:{fontWeight:500}},t.task),
            h('td',null,h(Badge,{cls:t.priority==='High'?'red':'amber'},t.priority)),
            h('td',null,h(Badge,{cls:t.status==='Complete'?'green':'muted'},t.status)),
            h('td',{style:{fontSize:11,color:'var(--muted)'}},t.due),
            h('td',null,t.status!=='Complete'&&h('button',{className:'btn btn-ghost btn-sm',onClick:async()=>{
            complete(t.id);setToast2('Task marked complete');
            const acct=getAccounts().find(a=>a.id===t.acct);
            if(acct) await hsSync('push_qa_complete',{accountName:acct.name,task:t.task,completedBy:'Pod Manager'});
          }},ico('ti-check'),' Done'))
          )))
        )
      );
    })
  );
}

    ?workers.filter(w=>!w.bench&&w.site===parseInt(acctFilter))
    :workers.filter(w=>!w.bench);
  const bench=acctFilter
    ?workers.filter(w=>w.bench&&w.trained.includes(parseInt(acctFilter)))
    :workers.filter(w=>w.bench);

  async function markCO(id){
    const w=workers.find(x=>x.id===id);
    const site=getAccounts().find(a=>a.id===w?.site);
    setWorkers(p=>p.map(x=>x.id===id?{...x,status:'Called Out',callouts:x.callouts+1}:x));

      await hsSync('push_callout',{
        accountName:site.name,
        workerName:w.name,
        workerRole:w.role,
        calloutCount:w.callouts+1,
        shift:w.shift

// ── PREVENTIVE PM ─────────────────────────────────────────────────────────────
function PreventivePM({onToast}){
  const [items,setItems]=useState(INIT_PM);
  const [acctFilter,setAcctFilter]=useState('');
  const done=async id=>{
    const item=items.find(x=>x.id===id);
    const acct=getAccounts().find(a=>a.id===item?.acct);
    setItems(p=>p.map(x=>x.id===id?{...x,status:'Completed',last:'Today'}:x));
    onToast('PM item marked complete');
    if(item&&acct&&item.status==='Overdue'){
      await hsSync('update_ticket',{hsTicketId:item.hsTicketId,status:'Resolved'});
    }
  };
  useEffect(()=>{
    // Push overdue PM items to HubSpot on load
    items.filter(i=>i.status==='Overdue'&&!i.hsSynced).forEach(async item=>{
      const acct=getAccounts().find(a=>a.id===item.acct);
      if(acct){
        const res=await hsSync('create_pm_ticket',{task:item.task,accountName:acct.name,due:item.due,freq:item.freq,pmId:item.id});
        if(res?.hsTicketId) setItems(p=>p.map(x=>x.id===item.id?{...x,hsSynced:true,hsTicketId:res.hsTicketId}:x));
      }
    });
  },[]);
  const filtered=acctFilter?items.filter(i=>i.acct===parseInt(acctFilter)):items;

  return h(Fragment,null,
    h('div',{className:'filter-bar'},
      h(AccountFilter,{value:acctFilter,onChange:setAcctFilter}),
      h('button',{className:'btn btn-primary btn-sm',style:{marginLeft:'auto'}},ico('ti-plus'),' Add PM Item')
    ),
    h('div',{className:'grid g4',style:{marginBottom:16}},
      [
        {label:'Overdue',value:filtered.filter(i=>i.status==='Overdue').length,c:'var(--red)'},
        {label:'Due Soon (7d)',value:filtered.filter(i=>i.status==='Due Soon').length,c:'var(--amber)'},
        {label:'Scheduled',value:filtered.filter(i=>i.status==='Scheduled').length,c:'var(--accent2)'},
        {label:'Completed',value:filtered.filter(i=>i.status==='Completed').length,c:'var(--green)'},
      ].map(s=>h('div',{key:s.label,className:'stat-card'},
        h('div',{className:'stat-label'},s.label),
        h('div',{className:'stat-value',style:{color:s.c}},s.value)
      ))
    ),
    h('div',{className:'card',style:{padding:0}},
      h('table',{className:'tbl'},
        h('thead',null,h('tr',null,['ID','Task','Account','Freq','Due','Last Done','Status',''].map(c=>h('th',{key:c},c)))),
        h('tbody',null,filtered.map(p=>h('tr',{key:p.id},
          h('td',{style:{fontFamily:'monospace',fontSize:10,color:'var(--muted)'}},p.id),
          h('td',{style:{fontWeight:500,fontSize:12}},p.task),
          h('td',{style:{fontSize:11,color:'var(--muted)'}},acctName(p.acct)),
          h('td',null,h(Tag,{t:p.freq})),
          h('td',{style:{fontWeight:700,fontSize:12,color:p.status==='Overdue'?'var(--red)':p.status==='Due Soon'?'var(--amber)':'var(--text)'}},p.due),
          h('td',{style:{fontSize:11,color:'var(--muted)'}},p.last),
          h('td',null,h(Badge,{cls:p.status==='Overdue'?'red':p.status==='Due Soon'?'amber':p.status==='Completed'?'green':'blue'},p.status)),
          h('td',null,p.status!=='Completed'&&h('button',{className:'btn btn-ghost btn-sm',onClick:()=>done(p.id)},ico('ti-check'),' Done'))
        )))
      )
    )
  );
}

// ── ALAN AI ───────────────────────────────────────────────────────────────────
const SYS=`You are Alan AI, the intelligent operations assistant for FacilityIQ by DSC Solutions. Pod 3 covers Harrisburg/Lancaster corridor. You help pod owners with quality assurance, worker management, client satisfaction, PM scheduling, and operational decisions. DSC Solutions operates across 17 states with ~450 employees. Call-out policy: 3+ = verbal coaching, 5+ = written warning, 7+ = PIP (rolling 90 days). Always lead with coverage solution first. Alan Kaufman is Managing Director. Sharlene is Fleet Manager. Be direct, concise, and operational.`;

function AlanAI(){
  const [msgs,setMsgs]=useState([{role:'assistant',text:"Hey — I'm Alan AI. I have full context on your Pod 3 accounts, workers, call-out policies, and QA protocols. What do you need?"}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[msgs,loading]);

  async function send(){
    if(!input.trim()||loading)return;
    const txt=input.trim();setInput('');
    const nm=[...msgs,{role:'user',text:txt}];
    setMsgs(nm);setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,
          messages:nm.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.text}))
        })
      });
      const data=await res.json();
      const reply=data.content&&data.content.find(b=>b.type==='text')?data.content.find(b=>b.type==='text').text:'No response.';
      setMsgs(p=>[...p,{role:'assistant',text:reply}]);
    }catch(e){
      setMsgs(p=>[...p,{role:'assistant',text:'Connection error — check network or API key.'}]);
    }
    setLoading(false);
  }

  const QP=["Elton Craig has 4 call-outs — what's our next step?","Draft coverage request message for tonight's shift","Satisfaction at Armstrong is 79 — what should I do?","Generate a QA checklist for a healthcare account"];

  return h('div',{style:{display:'flex',flexDirection:'column',height:'calc(100vh - 140px)'}},
    h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}},
      QP.map(q=>h('button',{key:q,className:'btn btn-ghost btn-sm',style:{fontSize:11},onClick:()=>setInput(q)},q))
    ),
    h('div',{className:'card',style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      h('div',{style:{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:12,paddingBottom:6}},
        msgs.map((m,i)=>h('div',{key:i,className:'chat-msg '+(m.role==='user'?'user':'')},
          m.role==='assistant'&&h('div',{style:{width:28,height:28,borderRadius:7,background:'linear-gradient(135deg,var(--accent),var(--purple))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:13,fontWeight:700,color:'#fff'}},'A'),
          h('div',{className:'chat-bubble',style:{whiteSpace:'pre-wrap'}},m.text)
        )),
        loading&&h('div',{className:'chat-msg'},
          h('div',{style:{width:28,height:28,borderRadius:7,background:'linear-gradient(135deg,var(--accent),var(--purple))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:13,fontWeight:700,color:'#fff'}},'A'),
          h('div',{className:'chat-bubble'},h('div',{className:'typing-dots'},h('span'),h('span'),h('span')))
        ),
        h('div',{ref:endRef})
      ),
      h('div',{style:{display:'flex',gap:7,marginTop:10}},
        h('textarea',{className:'chat-input',placeholder:'Ask about coverage, QA, accounts, policy...',value:input,rows:1,
          onChange:e=>setInput(e.target.value),
          onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}),
        h('button',{className:'btn btn-primary',onClick:send,disabled:!input.trim()||loading,style:{height:40,alignSelf:'flex-end'}},ico('ti-send'))
      )
    )
  );
}

async function authCall(action, payload) {
  const res = await fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...payload }),
  });
  return res.json();
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function handleLogin() {
    if (!email || !password) return;
    setLoading(true); setError('');
    const res = await authCall('login', { email, password });
    if (res.success) {
      localStorage.setItem('fiq_token', res.token);
      localStorage.setItem('fiq_user', JSON.stringify(res.user));
      onLogin(res.user, res.token);
    } else {
      setError(res.error || 'Login failed');
    }
    setLoading(false);
  }

  return h('div', { style: { display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', background:'var(--bg)', flexDirection:'column', gap:0 } },
    h('div', { style: { width:380, padding:32, background:'var(--card)', border:'1px solid var(--border)', borderRadius:16 } },
      h('div', { style: { display:'flex', alignItems:'center', gap:10, marginBottom:28 } },
        h('div', { style: { width:36, height:36, borderRadius:9, background:'linear-gradient(135deg,var(--accent),var(--purple))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, fontWeight:700, color:'#fff' } }, 'F'),
        h('div', null,
          h('div', { style: { fontSize:18, fontWeight:700, color:'var(--text)', letterSpacing:'-.3px' } },
            'Facility', h('span', { style: { color:'var(--accent2)' } }, 'IQ')
          ),
          h('div', { style: { fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.5px' } }, 'DSC Solutions')
        )
      ),
      h('div', { style: { fontSize:14, fontWeight:600, color:'var(--text)', marginBottom:20 } }, 'Sign in to your pod'),
      h('div', { style: { marginBottom:12 } },
        h('div', { style: { fontSize:11, color:'var(--muted)', marginBottom:5, fontWeight:600 } }, 'EMAIL'),
        h('input', { className:'field-input', type:'email', placeholder:'you@dscsolutionsfm.com', value:email,
          onChange:e=>setEmail(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&handleLogin() })
      ),
      h('div', { style: { marginBottom:20 } },
        h('div', { style: { fontSize:11, color:'var(--muted)', marginBottom:5, fontWeight:600 } }, 'PASSWORD'),
        h('input', { className:'field-input', type:'password', placeholder:'••••••••', value:password,
          onChange:e=>setPassword(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&handleLogin() })
      ),
      error && h('div', { style: { fontSize:12, color:'var(--red)', marginBottom:12, padding:'8px 12px', background:'rgba(239,68,68,.08)', borderRadius:7, border:'1px solid rgba(239,68,68,.2)' } }, error),
      h('button', { className:'btn btn-primary', style:{ width:'100%', justifyContent:'center', padding:'10px' }, onClick:handleLogin, disabled:loading||!email||!password },
        loading ? 'Signing in...' : ico('ti-login') + ' Sign In'
      ),
      h('div', { style: { marginTop:16, fontSize:11, color:'var(--muted2)', textAlign:'center' } }, 'FacilityIQ v2 · DSC Solutions')
    )
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
function AdminPanel({ token, onClose, onToast }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [editUser, setEditUser] = useState(null);
  const [form, setForm] = useState({ email:'', name:'', pod:'Strategic Accounts', role:'pod_manager', password:'' });

  useEffect(() => {
    authCall('list_users', { token }).then(res => {
      if (res.success) setUsers(res.users);
      setLoading(false);
    });
  }, []);

  async function handleCreate() {
    const res = await authCall('create_user', { token, ...form });
    if (res.success) {
      onToast('User ' + form.email + ' created');
      setShowCreate(false);
      setForm({ email:'', name:'', pod:'Strategic Accounts', role:'pod_manager', password:'' });
      const refreshed = await authCall('list_users', { token });
      if (refreshed.success) setUsers(refreshed.users);
    } else {
      onToast('Error: ' + res.error);
    }
  }

  async function handleUpdate() {
    const res = await authCall('update_user', { token, ...editUser });
    if (res.success) {
      onToast('User updated');
      setEditUser(null);
      const refreshed = await authCall('list_users', { token });
      if (refreshed.success) setUsers(refreshed.users);
    } else {
      onToast('Error: ' + res.error);
    }
  }

  async function handleDelete(email) {
    if (!confirm('Delete user ' + email + '?')) return;
    const res = await authCall('delete_user', { token, email });
    if (res.success) {
      onToast('User deleted');
      setUsers(p => p.filter(u => u.email !== email));
    }
  }

  const UserForm = ({ data, setData, onSubmit, onCancel, submitLabel }) =>
    h('div', { style:{ display:'flex', flexDirection:'column', gap:12 } },
      h('div', { className:'grid g2' },

          h('div', { style:{ fontSize:11, color:'var(--muted)', marginBottom:5 } }, 'EMAIL'),
          h('input', { className:'field-input', placeholder:'email@dscsolutionsfm.com', value:data.email, onChange:e=>setData({...data,email:e.target.value}), disabled:!!editUser })
        )
      ),
      h('div', { className:'grid g2' },
        h('div', null,
          h('div', { style:{ fontSize:11, color:'var(--muted)', marginBottom:5 } }, 'POD ASSIGNMENT'),
          h('select', { className:'field-input', value:data.pod, onChange:e=>setData({...data,pod:e.target.value}) },
            PODS.map(p => h('option', { key:p, value:p }, p))

        ),
        h('div', null,
          h('div', { style:{ fontSize:11, color:'var(--muted)', marginBottom:5 } }, 'ROLE'),

      ),
      h('div', null,
        h('div', { style:{ fontSize:11, color:'var(--muted)', marginBottom:5 } }, submitLabel==='Update User' ? 'NEW PASSWORD (leave blank to keep current)' : 'TEMPORARY PASSWORD'),

      h('div', { style:{ display:'flex', gap:8, justifyContent:'flex-end' } },
        h('button', { className:'btn btn-ghost', onClick:onCancel }, 'Cancel'),
        h('button', { className:'btn btn-primary', onClick:onSubmit, disabled:!data.name||!data.email||(!editUser&&!data.password) }, ico('ti-check'), ' ', submitLabel)
      )

  return h('div', { className:'modal-backdrop', onClick:onClose },
    h('div', { className:'modal', style:{ width:700 }, onClick:e=>e.stopPropagation() },

        h('button', { className:'btn btn-ghost btn-sm', style:{ marginLeft:'auto' }, onClick:onClose }, ico('ti-x'))
      ),

      showCreate && h('div', { style:{ marginBottom:20, padding:16, background:'var(--surface)', borderRadius:10, border:'1px solid var(--border)' } },
        h('div', { style:{ fontSize:13, fontWeight:600, marginBottom:12 } }, 'Create New User'),
        h(UserForm, { data:form, setData:setForm, onSubmit:handleCreate, onCancel:()=>setShowCreate(false), submitLabel:'Create User' })

      editUser && h('div', { style:{ marginBottom:20, padding:16, background:'var(--surface)', borderRadius:10, border:'1px solid var(--border)' } },
        h('div', { style:{ fontSize:13, fontWeight:600, marginBottom:12 } }, 'Edit User — ' + editUser.email),
        h(UserForm, { data:editUser, setData:setEditUser, onSubmit:handleUpdate, onCancel:()=>setEditUser(null), submitLabel:'Update User' })
      ),

      !showCreate && !editUser && h('div', { style:{ display:'flex', justifyContent:'flex-end', marginBottom:12 } },
        h('button', { className:'btn btn-primary btn-sm', onClick:()=>setShowCreate(true) }, ico('ti-plus'), ' Add User')
      ),

      loading ? h('div', { style:{ fontSize:12, color:'var(--muted)', padding:'20px 0' } }, 'Loading users...') :
      h('div', { className:'card', style:{ padding:0 } },
        h('table', { className:'tbl' },
          h('thead', null, h('tr', null, ['Name','Email','Pod','Role','Created',''].map(c=>h('th',{key:c},c)))),
          h('tbody', null, users.map(u =>
            h('tr', { key:u.email },
              h('td', { style:{ fontWeight:500 } }, u.name),
              h('td', { style:{ fontSize:11, color:'var(--muted)', fontFamily:'monospace' } }, u.email),
              h('td', null, h(Badge, { cls:'blue' }, u.pod)),
              h('td', null, h(Badge, { cls:u.role==='admin'?'purple':u.role==='supervisor'?'amber':'muted' }, u.role)),
              h('td', { style:{ fontSize:11, color:'var(--muted)' } }, u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—'),
              h('td', null,
                h('div', { style:{ display:'flex', gap:5 } },
                  h('button', { className:'btn btn-ghost btn-sm', onClick:()=>setEditUser({...u,password:''}) }, ico('ti-pencil')),
                  u.email !== 'alan_c@dscsolutionsfm.com' &&
                  h('button', { className:'btn btn-danger btn-sm', onClick:()=>handleDelete(u.email) }, ico('ti-trash'))
                )
              )
            )
          ))
        )
      )
    )
  );
}

function App(){
  const [page,setPage]=useState('overview');
  const [toast,setToast]=useState(null);
  const [hsData,setHsData]=useState(null);
  const [hsLoading,setHsLoading]=useState(true);
  const [showAdmin,setShowAdmin]=useState(false);

  // Auth state
  const [user,setUser]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);

  // Check for existing session on load
  useEffect(()=>{
    const token=localStorage.getItem('fiq_token');
    const savedUser=localStorage.getItem('fiq_user');
    if(token&&savedUser){
      authCall('validate_session',{token}).then(res=>{
        if(res.success){
          setUser(res.user);
          loadHubSpot(res.user.pod,token);
        } else {
          localStorage.removeItem('fiq_token');
          localStorage.removeItem('fiq_user');
        }
        setAuthChecked(true);
      });
    } else {
      setAuthChecked(true);
      setHsLoading(false);
    }
  },[]);

  function loadHubSpot(pod,token){
    setHsLoading(true);
    hsPull(pod).then(data=>{
      if(data&&data.accounts&&data.accounts.length>0){
        // Update module-level live data so all components use it
        _ACCOUNTS = data.accounts;
        _TICKETS  = data.tickets;
        _WORKERS  = data.workers;
        setHsData(data);
      }
      setHsLoading(false);
    }).catch(()=>setHsLoading(false));
  }

  function handleLogin(userData,token){
    setUser(userData);
    loadHubSpot(userData.pod,token);
  }

  async function handleLogout(){
    const token=localStorage.getItem('fiq_token');
    if(token) await authCall('logout',{token});
    localStorage.removeItem('fiq_token');
    localStorage.removeItem('fiq_user');
    setUser(null);setHsData(null);setHsLoading(false);
  }

  // Not checked yet — blank screen
  if(!authChecked) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}},
    h('div',{style:{color:'var(--muted)',fontSize:13}},'Loading...')
  );

  // Not logged in — show login screen
  if(!user) return h(LoginScreen,{onLogin:handleLogin});

  const liveAccounts = hsData ? hsData.accounts : getAccounts();
  const liveTickets  = hsData ? hsData.tickets  : getTickets();
  const liveWorkers  = hsData ? hsData.workers  : getWorkers();

  const props={onToast:setToast,setPage,liveAccounts,liveTickets,liveWorkers};

  return h('div',{style:{display:'flex',width:'100%',height:'100vh',overflow:'hidden'}},
    toast&&h(Toast,{msg:toast,onDone:()=>setToast(null)}),
    h('div',{className:'sidebar'},
      h('div',{className:'sidebar-logo'},
        h('div',{className:'logo-mark'},'F'),
        h('div',null,
          h('div',{className:'logo-word'},'Facility',h('span',null,'IQ')),
          h('div',{className:'logo-sub'},'DSC Solutions · Pod 3')
        )
      ),
      h('div',{className:'nav-section'},
        NAV.map(n=>h('div',{key:n.id,className:'nav-item '+(page===n.id?'active':''),onClick:()=>setPage(n.id)},
          ico(n.icon),
          h('span',null,n.label),
          n.badge&&h('span',{className:'nav-badge '+(n.bc==='amber'?'amber':'')},n.badge)
        ))
      ),
      h('div',{className:'sidebar-footer'},
        h('div',{className:'user-chip'},
          h('div',{className:'avatar'},user.name.split(' ').map(p=>p[0]).join('').slice(0,2)),
          h('div',null,
            h('div',{className:'user-name'},user.name),
            h('div',{className:'user-role'},user.pod)
          ),
          ico('ti-dots-vertical',{marginLeft:'auto',color:'var(--muted)',fontSize:15})
        )
      )
    ),
    showAdmin&&h(AdminPanel,{token:localStorage.getItem('fiq_token'),onClose:()=>setShowAdmin(false),onToast:setToast}),
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('div',{className:'topbar-bread'},
          h('span',{style:{color:'var(--muted2)'}},'FacilityIQ'),
          ico('ti-chevron-right',{fontSize:11}),
          h('span',null,LABELS[page])
        ),
        h('div',{className:'topbar-actions'},
          h('span',{className:'live-pill'},ico('ti-circle-filled',{fontSize:6}),' Live'),
          h('span',{style:{fontSize:11,color:'var(--muted)',background:'var(--surface)',border:'1px solid var(--border)',padding:'3px 10px',borderRadius:99,display:'inline-flex',alignItems:'center',gap:5}},
            ico('ti-map-pin',{fontSize:11}),user.pod
          ),
          hsLoading
            ? h('span',{style:{fontSize:10,color:'var(--muted)',display:'flex',alignItems:'center',gap:4}},ico('ti-refresh',{fontSize:12}),' Syncing...')
            : hsData
              ? h('span',{style:{fontSize:10,background:'rgba(34,197,94,.1)',color:'var(--green)',border:'1px solid rgba(34,197,94,.2)',padding:'2px 8px',borderRadius:99,fontWeight:700,display:'inline-flex',alignItems:'center',gap:4}},ico('ti-brand-hubspot',{fontSize:11}),' HS Live')
              : h('span',{style:{fontSize:10,color:'var(--amber)',display:'flex',alignItems:'center',gap:4}},ico('ti-alert-triangle',{fontSize:12}),' Local'),
          // View switcher — admin only
          user.role==='admin'&&h('div',{style:{display:'flex',alignItems:'center',gap:3,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'3px 4px'}},
            h('span',{style:{fontSize:9,fontWeight:700,color:'var(--muted2)',textTransform:'uppercase',letterSpacing:'.5px',padding:'0 4px'}},'View:'),
            h('button',{
              style:{padding:'3px 8px',borderRadius:5,border:'1px solid var(--accent)',background:'rgba(79,126,255,.12)',color:'var(--accent2)',fontSize:10,fontWeight:700,cursor:'default',fontFamily:'inherit'},
              title:'Current: Supervisor View'},
              ico('ti-layout-dashboard',{fontSize:11}),' Supervisor'
            ),
            h('button',{
              style:{padding:'3px 8px',borderRadius:5,border:'1px solid var(--border)',background:'transparent',color:'var(--muted)',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'inherit'},
              title:'Switch to Employee View',
              onClick:()=>window.open('/employee','_blank')},
              ico('ti-hard-hat',{fontSize:11}),' Employee'
            ),
            h('button',{
              style:{padding:'3px 8px',borderRadius:5,border:'1px solid var(--border)',background:'transparent',color:'var(--muted)',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'inherit'},
              title:'Customer view — coming soon',
              onClick:()=>alert('Customer view coming soon!')},
              ico('ti-building',{fontSize:11}),' Customer'
            )
          ),
          user.role==='admin'&&h('button',{className:'topbar-icon-btn',onClick:()=>setShowAdmin(true),title:'User Management'},ico('ti-users-group')),
          h('button',{className:'topbar-icon-btn'},ico('ti-bell')),
          h('button',{className:'topbar-icon-btn',onClick:handleLogout,title:'Sign Out'},ico('ti-logout'))
        )
      ),
      h('div',{className:'content'},
        page==='overview'&&h(Overview,props),
        page==='accounts'&&h(Accounts,props),
        page==='inspections'&&h(InspectionsPage,props),
        page==='satisfaction'&&h(OccupantSatisfaction,props),
        page==='tickets'&&h(Tickets,props),
        page==='workers'&&h(Workers,props),
        page==='pm'&&h(PreventivePM,props),
        page==='qa'&&h(QATasks,props),
        page==='ai'&&h(AlanAI,props)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
