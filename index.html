<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0C0D12;
    --surface:  #13141B;
    --card:     #181922;
    --border:   #252733;
    --border2:  #2E3144;
    --text:     #E8EAF2;
    --muted:    #7B7F99;
    --muted2:   #4E5270;
    --accent:   #4F7EFF;
    --accent2:  #6B96FF;
    --green:    #22C55E;
    --amber:    #F59E0B;
    --red:      #EF4444;
    --purple:   #A78BFA;
    --cyan:     #22D3EE;
    --sidebar-w: 220px;
    --topbar-h:  56px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; overflow: hidden; }
  #root { display: flex; height: 100vh; overflow: hidden; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 100;
    overflow: hidden;
    transition: width .2s ease;
  }
  .sidebar-logo {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: var(--topbar-h);
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -.3px; color: var(--text); }
  .logo-sub { font-size: 10px; color: var(--muted); font-weight: 400; letter-spacing: .5px; text-transform: uppercase; }

  .nav-section { padding: 12px 12px 4px; }
  .nav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted2); padding: 0 8px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    color: var(--muted); font-size: 13px; font-weight: 500;
    transition: all .15s; position: relative; white-space: nowrap;
    border: 1px solid transparent;
    margin-bottom: 1px;
  }
  .nav-item:hover { background: rgba(79,126,255,.07); color: var(--text); }
  .nav-item.active {
    background: rgba(79,126,255,.12);
    color: var(--accent2);
    border-color: rgba(79,126,255,.2);
  }
  .nav-item.active::before {
    content: '';
    position: absolute; left: -12px; top: 6px; bottom: 6px;
    width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
    box-shadow: 0 0 8px var(--accent);
  }
  .nav-item .ti { font-size: 17px; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto; background: var(--red); color: #fff;
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 99px; min-width: 18px; text-align: center;
  }
  .nav-badge.amber { background: var(--amber); color: #000; }
  .nav-badge.green { background: var(--green); }

  .sidebar-footer {
    margin-top: auto; border-top: 1px solid var(--border); padding: 12px;
  }
  .user-chip {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
  }
  .user-chip:hover { background: rgba(255,255,255,.04); }
  .avatar {
    width: 32px; height: 32px; border-radius: 99px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .user-role { font-size: 11px; color: var(--muted); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    height: var(--topbar-h); min-height: var(--topbar-h);
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-bread { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .topbar-icon-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s; font-size: 18px;
  }
  .topbar-icon-btn:hover { background: rgba(255,255,255,.04); color: var(--text); }

  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .card-sm { padding: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .card-title .ti { font-size: 15px; }
  
  /* Grid helpers */
  .grid { display: grid; gap: 16px; }
  .g2 { grid-template-columns: 1fr 1fr; }
  .g3 { grid-template-columns: 1fr 1fr 1fr; }
  .g4 { grid-template-columns: repeat(4,1fr); }
  .g-stat { grid-template-columns: repeat(4,1fr); }

  /* Stat card */
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--text); line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-delta { font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 3px; }
  .stat-delta.up { color: var(--green); }
  .stat-delta.down { color: var(--red); }
  .stat-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; margin-bottom: 4px;
  }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600;
  }
  .badge-green { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
  .badge-red { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
  .badge-amber { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
  .badge-blue { background: rgba(79,126,255,.12); color: var(--accent2); border: 1px solid rgba(79,126,255,.25); }
  .badge-purple { background: rgba(167,139,250,.12); color: var(--purple); border: 1px solid rgba(167,139,250,.25); }
  .badge-muted { background: rgba(123,127,153,.1); color: var(--muted); border: 1px solid var(--border); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all .15s; font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(255,255,255,.04); color: var(--text); }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Table */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 0 16px 10px; text-align: left; }
  .tbl td { padding: 11px 16px; border-top: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .tbl tr:hover td { background: rgba(255,255,255,.02); }

  /* Progress bar */
  .progress-bar { height: 6px; border-radius: 99px; background: var(--border2); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

  /* Score circle */
  .score-ring {
    width: 56px; height: 56px; border-radius: 99px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; flex-shrink: 0;
  }

  /* Zone card */
  .zone-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; cursor: pointer;
    transition: all .15s;
  }
  .zone-card:hover { border-color: var(--border2); background: var(--card); }
  .zone-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  /* Tier pill */
  .tier-pill {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 6px;
    font-size: 11px; font-weight: 700;
  }
  .tier-a { background: rgba(239,68,68,.15); color: var(--red); }
  .tier-b { background: rgba(245,158,11,.15); color: var(--amber); }
  .tier-c { background: rgba(79,126,255,.15); color: var(--accent2); }
  .tier-d { background: rgba(34,197,94,.15); color: var(--green); }

  /* Chat */
  .chat-wrap { display: flex; flex-direction: column; height: 100%; }
  .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding-bottom: 8px; }
  .chat-msg { display: flex; gap: 10px; max-width: 85%; }
  .chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .chat-bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px; font-size: 13px; line-height: 1.55;
  }
  .chat-msg.user .chat-bubble { background: rgba(79,126,255,.15); border-color: rgba(79,126,255,.3); }
  .chat-input-row { display: flex; gap: 8px; margin-top: 12px; }
  .chat-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: inherit;
    font-size: 13px; resize: none; outline: none; transition: border-color .15s;
    min-height: 42px; max-height: 120px;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted2); }

  /* Satisfaction rating */
  .rating-stars { display: flex; gap: 3px; }
  .star { font-size: 13px; }
  .star.filled { color: var(--amber); }
  .star.empty { color: var(--border2); }

  /* Workers */
  .worker-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-top: 1px solid var(--border);
    transition: background .12s;
  }
  .worker-row:hover { background: rgba(255,255,255,.02); }
  .worker-avatar {
    width: 34px; height: 34px; border-radius: 99px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;

  .status-dot {
    width: 8px; height: 8px; border-radius: 99px; flex-shrink: 0;

  .status-dot.red { background: var(--red); }
  .status-dot.amber { background: var(--amber); }
  .status-dot.muted { background: var(--muted2); }

  /* HubSpot badge */
  .hs-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 6px;
    background: rgba(255,91,46,.12); color: #FF5B2E;
    border: 1px solid rgba(255,91,46,.25); font-size: 10px; font-weight: 700;
    letter-spacing: .3px;

  /* PM Status */
  .pm-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .pm-icon-box {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }

  /* Ticket card */
  .ticket-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    display: flex; gap: 12px; align-items: flex-start;
    transition: border-color .15s;
  }
  .ticket-card:hover { border-color: var(--border2); }
  .priority-bar { width: 3px; border-radius: 99px; align-self: stretch; flex-shrink: 0; }

  /* Input */
  .field-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: inherit;
    font-size: 13px; outline: none; width: 100%; transition: border-color .15s;
  }
  .field-input:focus { border-color: var(--accent); }

  /* Select */
  select.field-input { cursor: pointer; }
  select.field-input option { background: var(--card); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* Walkthrough scoring */
  .score-btn {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; cursor: pointer;
    border: 1.5px solid var(--border2); background: var(--surface);
    color: var(--muted); transition: all .15s;
  }
  .score-btn:hover { border-color: var(--muted); color: var(--text); }
  .score-btn.active { color: #fff; border-color: transparent; }
  .score-1.active { background: var(--red); }
  .score-2.active { background: #F97316; }
  .score-3.active { background: var(--amber); }
  .score-4.active { background: #84CC16; }
  .score-5.active { background: var(--green); }

  /* QR Feed */
  .qr-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start;
  }
  .qr-source {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; width: 520px; max-width: 95vw;
    max-height: 80vh; overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* Typing indicator */
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 99px; background: var(--muted);
    animation: dot-bounce .9s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes dot-bounce { 0%,80%,100% { transform: scale(.6); opacity:.4 } 40% { transform: scale(1); opacity:1 } }

  /* Scrollable panel */
  .scroll-panel { overflow-y: auto; max-height: 420px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; display: flex; gap: 10px; align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.4); font-size: 13px; font-weight: 500;
    animation: slide-up .25s ease;
  }
  @keyframes slide-up { from { transform: translateY(20px); opacity:0 } to { transform: translateY(0); opacity:1 } }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-state .ti { font-size: 42px; display: block; margin-bottom: 12px; opacity: .35; }
  .empty-state p { font-size: 13px; }

  /* Highlight chip */
  .highlight-chip {
    background: rgba(79,126,255,.08); border: 1px solid rgba(79,126,255,.18);
    border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--muted);
  }
  .highlight-chip strong { color: var(--accent2); }

  /* Trend spark */
  .spark-line { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
  .spark-bar { width: 5px; border-radius: 2px 2px 0 0; background: var(--accent); opacity: .6; min-height: 3px; }

  /* Tag */
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(123,127,153,.08); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 7px; font-size: 11px; color: var(--muted); font-weight: 500;
  }
</style>
</head>

// ── HELPERS ───────────────────────────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 4) return "#22C55E";
  if (s >= 3) return "#F59E0B";
  if (s >= 2) return "#F97316";
  return "#EF4444";
}
function priorityColor(p) {
  if (p === "High") return "#EF4444";
  if (p === "Medium") return "#F59E0B";
  return "#7B7F99";
}
function Stars({ n }) {
  return <div className="rating-stars">
    {[1,2,3,4,5].map(i => (
      <span key={i} className={"star " + (i <= n ? "filled" : "empty")}>★</span>
    ))}
  </div>;
}
function SparkBars({ data }) {
  const max = Math.max(...data);
  return <div className="spark-line">
    {data.map((v, i) => (
      <div key={i} className="spark-bar" style={{ height: `${(v / max) * 28}px` }} />
    ))}
  </div>;
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function Toast({ msg, icon, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3200); return () => clearTimeout(t); }, []);
  return (
    <div className="toast">
      <i className={"ti " + icon} style={{ fontSize: 18, color: "var(--green)" }} />
      <span>{msg}</span>
    </div>
  );
}

// ── WALKTHROUGH ───────────────────────────────────────────────────────────────
function Walkthrough({ onToast }) {
  const [scores, setScores] = useState({});
  const [selZone, setSelZone] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [tickets, setTickets] = useState([]);

  function handleScore(zoneId, area, val) {
    setScores(prev => ({
      ...prev,
      [`${zoneId}-${area}`]: val
    }));
  }

  function handleSubmit() {
    const newTickets = [];
    Object.entries(scores).forEach(([key, val]) => {
      if (val <= 2) {
        const [zoneId, ...areaParts] = key.split("-");
        const area = areaParts.join("-");
        const zone = ZONES.find(z => z.id === parseInt(zoneId));
        newTickets.push({ area, zone: zone?.name, score: val });
      }
    });
    setTickets(newTickets);
    setSubmitted(true);
    if (newTickets.length > 0) onToast(`${newTickets.length} auto-ticket${newTickets.length > 1 ? "s" : ""} created from low scores`);
  }

  if (submitted) {
    return (
      <div>
        <div className="card" style={{ marginBottom: 16, borderColor: "rgba(34,197,94,.3)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
            <div style={{ width: 40, height: 40, borderRadius: 99, background: "rgba(34,197,94,.12)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <i className="ti ti-circle-check" style={{ fontSize: 22, color: "var(--green)" }} />
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15 }}>Walkthrough Submitted</div>
              <div style={{ fontSize: 12, color: "var(--muted)" }}>
                {Object.keys(scores).length} areas scored · {tickets.length} tickets auto-created
              </div>
            </div>
            <button className="btn btn-ghost btn-sm" style={{ marginLeft: "auto" }} onClick={() => { setScores({}); setSubmitted(false); setTickets([]); }}>
              <i className="ti ti-refresh" /> New Walk
            </button>
          </div>
        </div>
        {tickets.length > 0 && (
          <div className="card">
            <div className="card-title"><i className="ti ti-ticket" style={{ color: "var(--red)" }} /> Auto-Created Tickets</div>
            {tickets.map((t, i) => (
              <div key={i} className="ticket-card" style={{ marginBottom: 8 }}>
                <div className="priority-bar" style={{ background: t.score === 1 ? "var(--red)" : "var(--amber)" }} />
                <div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{t.area} — Score {t.score}/5</div>
                  <div style={{ fontSize: 11, color: "var(--muted)" }}>{t.zone} · Assigned for review</div>
                </div>
                <span className="badge badge-red" style={{ marginLeft: "auto" }}>Auto-Ticket</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div className="grid g2" style={{ marginBottom: 20 }}>
        {ZONES.map(z => (
          <div key={z.id} className={"zone-card " + (selZone?.id === z.id ? "selected" : "")}
            onClick={() => setSelZone(selZone?.id === z.id ? null : z)}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{z.name}</div>
              <span style={{ fontSize: 11, color: "var(--muted)", background: "var(--border)", padding: "2px 7px", borderRadius: 6 }}>
                {z.areas.length} areas
              </span>
            </div>
            {z.areas.map(area => {
              const key = `${z.id}-${area}`;
              const val = scores[key];
              return (
                <div key={area} style={{ marginBottom: 8 }}>
                  <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 5 }}>{area}</div>
                  <div style={{ display: "flex", gap: 5 }}>
                    {[1,2,3,4,5].map(n => (
                      <button key={n}
                        className={"score-btn score-" + n + (val === n ? " active" : "")}
                        onClick={e => { e.stopPropagation(); handleScore(z.id, area, n); }}>
                        {n}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 12, color: "var(--muted)" }}>
          {Object.keys(scores).length} of {ZONES.flatMap(z => z.areas).length} areas scored
          {Object.values(scores).filter(v => v <= 2).length > 0 && (
            <span style={{ color: "var(--amber)", marginLeft: 8 }}>
              · {Object.values(scores).filter(v => v <= 2).length} low score{Object.values(scores).filter(v => v <= 2).length > 1 ? "s" : ""} will auto-create tickets
            </span>
          )}
        </div>
        <button className="btn btn-primary" onClick={handleSubmit}>
          <i className="ti ti-send" /> Submit Walkthrough
        </button>
      </div>
    </div>
  );
}

// ── AI ASSISTANT ──────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are Inperium AI, the policy-aware facilities management assistant for DSC Solutions. You help pod owners manage janitorial operations, quality assurance, worker scheduling, and client satisfaction.

Key context:
- DSC Solutions is a facilities management company operating across 17 states with ~450 employees, serving Fortune 500 companies and government agencies
- You assist with Cerberus SOP tiers: A (Critical/Emergency), B (Daily Ops), C (Weekly), D (Scheduled Maintenance)
- You understand call-out policies: 3+ call-outs trigger coaching review; 5+ may trigger HR involvement
- You can help dispatch tickets, interpret satisfaction scores, write SOPs, and coach supervisors
- Be direct, specific, and action-oriented. Alan Kaufman is the Managing Director. Sharlene is the Fleet Manager.
- Pod 3 covers the Harrisburg/Lancaster corridor.

When asked about call-out guidance: remind of progressive discipline — verbal coaching at 3, written warning at 5, PIP at 7 within rolling 90 days, per DSC policy. Always lead with coverage solution first, then documentation.

Keep responses concise and operational.`;

function AIAssistant() {
  const [msgs, setMsgs] = useState([
    {
      role: "assistant",
      text: "Hey — I'm Inperium AI. I'm briefed on Cerberus SOP tiers, your active accounts, call-out policy, and ticket protocols. What do you need?",
    }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);

  async function send() {
    if (!input.trim() || loading) return;
    const userText = input.trim();
    setInput("");
    const newMsgs = [...msgs, { role: "user", text: userText }];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const apiMessages = newMsgs.map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.text }));
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: apiMessages,
        }),
      });
      const data = await res.json();
      const reply = data.content?.find(b => b.type === "text")?.text || "No response.";
      setMsgs(prev => [...prev, { role: "assistant", text: reply }]);
    } catch (err) {
      setMsgs(prev => [...prev, { role: "assistant", text: "Connection error. Check your API key or network." }]);
    }
    setLoading(false);
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  }

  const quickPrompts = [
    "Elton Craig has 4 call-outs — what's our policy?",
    "Draft a Tier A SOP for biohazard cleanup",
    "Satisfaction at Armstrong dropped to 79 — recommended actions?",
    "What should I check on a building walkthrough for Commonwealth PA?",
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 140px)" }}>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
        {quickPrompts.map(q => (
          <button key={q} className="btn btn-ghost btn-sm" onClick={() => setInput(q)} style={{ fontSize: 11 }}>
            {q}
          </button>
        ))}
      </div>

      <div className="card" style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div className="chat-messages" style={{ flex: 1, overflowY: "auto" }}>
          {msgs.map((m, i) => (
            <div key={i} className={"chat-msg " + (m.role === "user" ? "user" : "")}>
              {m.role === "assistant" && (
                <div style={{ width: 30, height: 30, borderRadius: 8, background: "linear-gradient(135deg,var(--accent),var(--purple))", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <i className="ti ti-sparkles" style={{ fontSize: 15, color: "#fff" }} />
                </div>
              )}
              <div className="chat-bubble" style={{ whiteSpace: "pre-wrap" }}>{m.text}</div>
            </div>
          ))}
          {loading && (
            <div className="chat-msg">
              <div style={{ width: 30, height: 30, borderRadius: 8, background: "linear-gradient(135deg,var(--accent),var(--purple))", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <i className="ti ti-sparkles" style={{ fontSize: 15, color: "#fff" }} />
              </div>
              <div className="chat-bubble"><div className="typing-dots"><span /><span /><span /></div></div>
            </div>
          )}
          <div ref={endRef} />
        </div>
        <div className="chat-input-row">
          <textarea
            className="chat-input"
            placeholder="Ask about SOPs, call-out policy, satisfaction scores, tickets..."
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKey}
            rows={1}
          />
          <button className="btn btn-primary" onClick={send} disabled={!input.trim() || loading} style={{ height: 42, alignSelf: "flex-end" }}>
            <i className="ti ti-send" />
          </button>
        </div>
      </div>
    </div>
  );
}
