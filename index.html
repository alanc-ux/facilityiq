<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Inperium — Pod Owner Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0D12;--surface:#13141B;--card:#181922;--border:#252733;--border2:#2E3144;
  --text:#E8EAF2;--muted:#7B7F99;--muted2:#4E5270;
  --accent:#4F7EFF;--accent2:#6B96FF;
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--purple:#A78BFA;--cyan:#22D3EE;
  --sidebar-w:220px;--topbar-h:56px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
#root{display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow:hidden}
.sidebar-logo{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:var(--topbar-h)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.nav-section{padding:12px 12px 4px;flex:1;overflow-y:auto}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);padding:0 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;position:relative;white-space:nowrap;border:1px solid transparent;margin-bottom:1px}
.nav-item:hover{background:rgba(79,126,255,.07);color:var(--text)}
.nav-item.active{background:rgba(79,126,255,.12);color:var(--accent2);border-color:rgba(79,126,255,.2)}
.nav-item.active::before{content:'';position:absolute;left:-12px;top:6px;bottom:6px;width:3px;background:var(--accent);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--accent)}
.nav-item .ti{font-size:17px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
.nav-badge.amber{background:var(--amber);color:#000}
.sidebar-footer{margin-top:auto;border-top:1px solid var(--border);padding:12px}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer}
.user-chip:hover{background:rgba(255,255,255,.04)}
.avatar{width:32px;height:32px;border-radius:99px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-role{font-size:11px;color:var(--muted)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar-h);min-height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar-bread{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:18px}
.topbar-icon-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g4{grid-template-columns:repeat(4,1fr)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:6px}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text);line-height:1}
.stat-delta{font-size:11px;font-weight:500;display:flex;align-items:center;gap:3px}
.stat-delta.up{color:var(--green)}.stat-delta.down{color:var(--red)}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:4px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-red{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.badge-amber{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.badge-blue{background:rgba(79,126,255,.12);color:var(--accent2);border:1px solid rgba(79,126,255,.25)}
.badge-purple{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.badge-muted{background:rgba(123,127,153,.1);color:var(--muted);border:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:rgba(255,255,255,.04);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-sm{padding:4px 10px;font-size:12px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:0 16px 10px;text-align:left}
.tbl td{padding:11px 16px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.progress-bar{height:6px;border-radius:99px;background:var(--border2);overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .4s ease}
.zone-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:default;transition:all .15s}
.zone-card:hover{border-color:var(--border2)}
.tier-pill{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:700}
.tier-a{background:rgba(239,68,68,.15);color:var(--red)}
.tier-b{background:rgba(245,158,11,.15);color:var(--amber)}
.tier-c{background:rgba(79,126,255,.15);color:var(--accent2)}
.tier-d{background:rgba(34,197,94,.15);color:var(--green)}
.chat-msg{display:flex;gap:10px;max-width:85%}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-bubble{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.55}
.chat-msg.user .chat-bubble{background:rgba(79,126,255,.15);border-color:rgba(79,126,255,.3)}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:13px;resize:none;outline:none;min-height:42px;max-height:120px}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--muted2)}
.worker-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-top:1px solid var(--border)}
.worker-row:hover{background:rgba(255,255,255,.02)}
.worker-avatar{width:34px;height:34px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0}
.status-dot.green{background:var(--green);box-shadow:0 0 0 2px rgba(34,197,94,.2)}
.status-dot.red{background:var(--red)}.status-dot.muted{background:var(--muted2)}
.hs-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;background:rgba(255,91,46,.12);color:#FF5B2E;border:1px solid rgba(255,91,46,.25);font-size:10px;font-weight:700}
.pm-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--border);font-size:13px}
.ticket-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.ticket-card:hover{border-color:var(--border2)}
.priority-bar{width:3px;border-radius:99px;align-self:stretch;flex-shrink:0}
.field-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:100%}
.field-input:focus{border-color:var(--accent)}
select.field-input{cursor:pointer}
select.field-input option{background:var(--card)}
.score-btn{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:var(--surface);color:var(--muted);font-family:inherit}
.score-btn:hover{border-color:var(--muted);color:var(--text)}
.score-btn.active{color:#fff;border-color:transparent}
.s1.active{background:var(--red)}.s2.active{background:#F97316}.s3.active{background:var(--amber)}.s4.active{background:#84CC16}.s5.active{background:var(--green)}
.qr-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:520px;max-width:95vw;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:99px;background:var(--muted);animation:db .9s infinite ease-in-out}
.typing-dots span:nth-child(2){animation-delay:.15s}.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes db{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;gap:10px;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,.4);font-size:13px;font-weight:500;animation:su .25s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.highlight-chip{background:rgba(79,126,255,.08);border:1px solid rgba(79,126,255,.18);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted)}
.highlight-chip strong{color:var(--accent2)}
.spark-line{display:flex;align-items:flex-end;gap:2px;height:28px}
.spark-bar{width:5px;border-radius:2px 2px 0 0;background:var(--accent);opacity:.6;min-height:3px}
.tag{display:inline-flex;align-items:center;background:rgba(123,127,153,.08);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--muted);font-weight:500}
.live-pill{font-size:11px;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);padding:3px 10px;border-radius:99px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';
const {createElement:h,useState,useEffect,useRef,Fragment} = React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const ACCOUNTS=[

  {id:2,name:'Penn State Health',addr:'1850 E Park Dr, Harrisburg',sqft:'248,000',tier:'Gold',status:'Active',score:87,pod:'Pod 3'},

const INIT_TICKETS=[

  {id:'TKT-1040',title:'Restroom supply restock — 3rd floor',acct:'Highmark Health',priority:'Medium',status:'In Progress',assigned:'Dana Reyes',created:'4h ago',source:'Walkthrough',hubspot:true},
  {id:'TKT-1039',title:'Zone B break room odor complaint',acct:'Penn State Health',priority:'High',status:'Open',assigned:'Sharlene Torres',created:'6h ago',source:'QR Feedback',hubspot:false},

  {id:2,name:'Dana Reyes',role:'Janitor II',site:'Highmark Health',status:'On Site',shift:'6a–2p',callouts:0,color:'#22C55E'},
  {id:3,name:'Sharlene Torres',role:'Crew Lead',site:'Penn State Health',status:'On Site',shift:'7a–3p',callouts:2,color:'#A78BFA'},
  {id:4,name:'Elton Craig',role:'Janitor I',site:'Penn State Health',status:'Called Out',shift:'7a–3p',callouts:4,color:'#EF4444'},
  {id:5,name:'Priya Nair',role:'Floor Tech',site:'Commonwealth PA',status:'On Site',shift:'5a–1p',callouts:0,color:'#F59E0B'},
  {id:6,name:'James Okafor',role:'Janitor II',site:'Commonwealth PA',status:'Off Shift',shift:'3p–11p',callouts:1,color:'#22D3EE'},
  {id:7,name:'Mia Santos',role:'Day Porter',site:'Armstrong Flooring',status:'On Site',shift:'8a–4p',callouts:0,color:'#F472B6'},
];
const QA_TASKS={
  A:[{id:'A1',task:'Emergency biohazard response & containment',freq:'As Needed',last:'N/A'},{id:'A2',task:'Blood/bodily fluid cleanup protocol',freq:'As Needed',last:'N/A'},{id:'A3',task:'Critical area sterility inspection (labs/OR)',freq:'Daily',last:'Today'},{id:'A4',task:'Elevator call escalation — injury risk',freq:'Immediate',last:'N/A'}],
  B:[{id:'B1',task:'High-touch surface disinfection — lobbies',freq:'2× Daily',last:'Today 7a'},{id:'B2',task:'Restroom deep clean & restock',freq:'Daily',last:'Today 6a'},{id:'B3',task:'Entrance glass cleaning',freq:'Daily',last:'Yesterday'},{id:'B4',task:'Stairwell sweep & mop',freq:'Daily',last:'Today 6a'},{id:'B5',task:'Trash removal all floors',freq:'Daily',last:'Today 7a'}],
  C:[{id:'C1',task:'Carpet spot treatment & extraction',freq:'Weekly',last:'Mon'},{id:'C2',task:'Window interior cleaning (above 6ft)',freq:'Weekly',last:'Last Fri'},{id:'C3',task:'Conference room deep wipe-down',freq:'Weekly',last:'Mon'},{id:'C4',task:'Floor buffing & polish — Level 1',freq:'Weekly',last:'Last Wed'},{id:'C5',task:'Break room appliance exteriors',freq:'Weekly',last:'Mon'}],
  D:[{id:'D1',task:'Strip & wax hard floors',freq:'Quarterly',last:'Feb 2025'},{id:'D2',task:'High-dusting (ceilings, vents, fixtures)',freq:'Monthly',last:'May 2025'},{id:'D3',task:'Pressure wash exterior entry',freq:'Monthly',last:'Apr 2025'},{id:'D4',task:'HVAC diffuser cleaning',freq:'Quarterly',last:'Jan 2025'},{id:'D5',task:'Deep carpet extraction — full building',freq:'Semi-annual',last:'Jan 2025'}],
};
const ZONES=[
  {id:1,name:'Main Lobby',areas:['Entry Doors','Reception Desk','Elevators','Waiting Area']},
  {id:2,name:'Floor 2 – East Wing',areas:['Corridor A','Restrooms 2E','Break Room','Conference 201']},
  {id:3,name:'Floor 2 – West Wing',areas:['Corridor B','Restrooms 2W','Copy Room','Stairwell A']},
  {id:4,name:'Floor 3',areas:['Open Office','Restrooms 3N','Kitchen','Elevator Lobby 3']},
  {id:5,name:'Loading / Utility',areas:['Loading Dock','Janitor Closet','Utility Corridor','Dumpster Area']},
];
const QR_FEED=[
  {id:1,location:'Restroom 2E',rating:1,comment:'Out of paper towels, smells bad',time:'18 min ago',auto:true},
  {id:2,location:'Main Lobby',rating:4,comment:'Looks great today!',time:'1h ago',auto:false},
  {id:3,location:'Break Room L3',rating:2,comment:'Microwave needs cleaning',time:'2h ago',auto:true},
  {id:4,location:'Conference 201',rating:5,comment:'Spotless before our 9am meeting',time:'3h ago',auto:false},
  {id:5,location:'Stairwell A',rating:2,comment:'Spill on landing, still there from yesterday',time:'4h ago',auto:true},
];
const SAT_TREND=[{m:'Jan',v:81},{m:'Feb',v:79},{m:'Mar',v:82},{m:'Apr',v:84},{m:'May',v:87},{m:'Jun',v:89}];
const NPS_TREND=[{m:'Jan',v:42},{m:'Feb',v:38},{m:'Mar',v:44},{m:'Apr',v:47},{m:'May',v:52},{m:'Jun',v:55}];
const INIT_PM=[
  {id:'PM-01',task:'HVAC Filter Replacement — Building A',acct:'Highmark Health',due:'Jun 14',freq:'90 days',status:'Due Soon',last:'Mar 15'},
  {id:'PM-02',task:'Carpet Deep Extraction — All Floors',acct:'Penn State Health',due:'Jun 18',freq:'Semi-annual',status:'Scheduled',last:'Dec 2024'},
  {id:'PM-03',task:'Floor Strip & Wax — Lobby',acct:'Commonwealth PA',due:'Jul 01',freq:'Quarterly',status:'Scheduled',last:'Apr 2025'},
  {id:'PM-04',task:'Exterior Pressure Wash',acct:'Armstrong Flooring',due:'Jun 10',freq:'Monthly',status:'Overdue',last:'May 9'},
  {id:'PM-05',task:'High-Dust — Vents & Ceilings',acct:'Highmark Health',due:'Jun 22',freq:'Monthly',status:'Scheduled',last:'May 22'},
  {id:'PM-06',task:'Drain Treatment — Kitchen & Break Rooms',acct:'Penn State Health',due:'Jun 15',freq:'Monthly',status:'Due Soon',last:'May 15'},
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const pc = p => p==='High'?'#EF4444':p==='Medium'?'#F59E0B':'#7B7F99';
const ico = (cls, s) => h('i', {className:'ti '+cls, style:s||{}});
const Badge = ({cls, children}) => h('span', {className:'badge badge-'+cls}, children);
const Tag = ({t}) => h('span', {className:'tag'}, t);

function Toast({msg, onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t);},[]);
  return h('div',{className:'toast'}, ico('ti-check',{fontSize:18,color:'var(--green)'}), h('span',null,msg));
}

function Stars({n}){
  return h('div',{className:'rating-stars',style:{display:'flex',gap:3}},
    [1,2,3,4,5].map(i=>h('span',{key:i,style:{fontSize:13,color:i<=n?'var(--amber)':'var(--border2)'}}, '★'))
  );
}
function SparkBars({data}){
  const mx=Math.max(...data);
  return h('div',{className:'spark-line'},
    data.map((v,i)=>h('div',{key:i,className:'spark-bar',style:{height:Math.max(3,(v/mx)*28)+'px'}}))
  );
}

// ── SVG CHARTS (no deps) ──────────────────────────────────────────────────────
function LineChartSVG({data, color, h2}){
  const W=400, H=h2||140, pad={t:10,r:10,b:24,l:30};
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const mn=Math.min(...data.map(d=>d.v))-2, mx=Math.max(...data.map(d=>d.v))+2;
  const px=(i)=>pad.l+i*(iw/(data.length-1));
  const py=(v)=>pad.t+ih-(((v-mn)/(mx-mn))*ih);
  const pts=data.map((d,i)=>px(i)+','+py(d.v)).join(' ');
  const fill=data.map((d,i)=>px(i)+','+py(d.v)).join(' ')+' '+px(data.length-1)+','+(pad.t+ih)+' '+pad.l+','+(pad.t+ih);
  return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:H}},
    h('defs',null,h('linearGradient',{id:'lg'+color.replace('#',''),x1:'0',y1:'0',x2:'0',y2:'1'},
      h('stop',{offset:'0%',stopColor:color,stopOpacity:'0.25'}),
      h('stop',{offset:'100%',stopColor:color,stopOpacity:'0'})
    )),
    [0,1,2].map(i=>h('line',{key:i,x1:pad.l,y1:pad.t+ih*(i/2),x2:W-pad.r,y2:pad.t+ih*(i/2),stroke:'#252733',strokeWidth:'0.5',strokeDasharray:'4'})),
    h('polygon',{points:fill,fill:'url(#lg'+color.replace('#','')+')'}),
    h('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:'2'}),
    data.map((d,i)=>h('text',{key:i,x:px(i),y:H-6,textAnchor:'middle',fill:'#7B7F99',fontSize:'10'},d.m))
  );
}

function BarChartSVG({data, colors}){
  const W=400, H=140, pad={t:10,r:10,b:24,l:30};
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const mx=Math.max(...data.map(d=>d.v));
  const bw=Math.floor(iw/data.length*0.55);
  const gap=iw/data.length;
  return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:H}},
    [0,1,2].map(i=>h('line',{key:i,x1:pad.l,y1:pad.t+ih*(i/2),x2:W-pad.r,y2:pad.t+ih*(i/2),stroke:'#252733',strokeWidth:'0.5',strokeDasharray:'4'})),
    data.map((d,i)=>{
      const bh=Math.max(2,(d.v/mx)*ih);
      const x=pad.l+gap*i+(gap-bw)/2;
      const y=pad.t+ih-bh;
      const col=colors?colors[i%colors.length]:'#4F7EFF';
      return h(Fragment,{key:i},
        h('rect',{x,y,width:bw,height:bh,fill:col,opacity:'0.8',rx:'3'}),
        h('text',{x:x+bw/2,y:H-6,textAnchor:'middle',fill:'#7B7F99',fontSize:'10'},d.l||d.m||'')
      );
    })
  );
}

function DualBarChartSVG({data}){
  const W=400, H=140, pad={t:10,r:10,b:24,l:30};
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const mx=Math.max(...data.flatMap(d=>[d.a,d.b]));
  const slot=iw/data.length, bw=Math.floor(slot*0.3);
  return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:H}},
    [0,1,2].map(i=>h('line',{key:i,x1:pad.l,y1:pad.t+ih*(i/2),x2:W-pad.r,y2:pad.t+ih*(i/2),stroke:'#252733',strokeWidth:'0.5',strokeDasharray:'4'})),
    data.map((d,i)=>{
      const x=pad.l+slot*i+slot*0.1;
      const ah=Math.max(2,(d.a/mx)*ih), bh=Math.max(2,(d.b/mx)*ih);
      return h(Fragment,{key:i},
        h('rect',{x,y:pad.t+ih-ah,width:bw,height:ah,fill:'#EF4444',opacity:'0.75',rx:'2'}),
        h('rect',{x:x+bw+2,y:pad.t+ih-bh,width:bw,height:bh,fill:'#22C55E',opacity:'0.75',rx:'2'}),
        h('text',{x:x+bw,y:H-6,textAnchor:'middle',fill:'#7B7F99',fontSize:'9'},d.l)
      );
    })
  );
}

// ── WALKTHROUGH ───────────────────────────────────────────────────────────────
function Walkthrough({onToast}){
  const [scores,setScores]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [tickets,setTickets]=useState([]);

  function handleSubmit(){
    const t=[];
    Object.entries(scores).forEach(([key,val])=>{
      if(val<=2){
        const [zid,...rest]=key.split('-');
        const zone=ZONES.find(z=>z.id===parseInt(zid));
        t.push({area:rest.join('-'),zone:zone?zone.name:'',score:val});
      }
    });
    setTickets(t);setSubmitted(true);
    if(t.length>0)onToast(t.length+' auto-ticket'+(t.length>1?'s':'')+' created');
    else onToast('Walkthrough submitted — no issues found');
  }

  if(submitted)return h(Fragment,null,
    h('div',{className:'card',style:{marginBottom:16,borderColor:'rgba(34,197,94,.3)'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},

        h('div',null,
          h('div',{style:{fontWeight:700,fontSize:15}},'Walkthrough Submitted'),
          h('div',{style:{fontSize:12,color:'var(--muted)'}},Object.keys(scores).length+' areas scored · '+tickets.length+' tickets created')
        ),
        h('button',{className:'btn btn-ghost btn-sm',style:{marginLeft:'auto'},onClick:()=>{setScores({});setSubmitted(false);setTickets([]);}},ico('ti-refresh'),' New Walk')
      )
    ),
    tickets.length>0&&h('div',{className:'card'},
      h('div',{className:'card-title'},ico('ti-ticket',{color:'var(--red)'}),' Auto-Created Tickets'),
      tickets.map((t,i)=>h('div',{key:i,className:'ticket-card',style:{marginBottom:8}},
        h('div',{className:'priority-bar',style:{background:t.score===1?'var(--red)':'var(--amber)'}}),

          h('div',{style:{fontWeight:600,fontSize:13}},t.area+' — Score '+t.score+'/5'),
          h('div',{style:{fontSize:11,color:'var(--muted)'}},t.zone+' · Assigned for review')

        h(Badge,{cls:'red'},'Auto-Ticket')

  );

  return h(Fragment,null,
    h('div',{className:'grid g2',style:{marginBottom:20}},
      ZONES.map(z=>h('div',{key:z.id,className:'zone-card'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},

          h('span',{style:{fontSize:11,color:'var(--muted)',background:'var(--border)',padding:'2px 7px',borderRadius:6}},z.areas.length+' areas')
        ),

          return h('div',{key:area,style:{marginBottom:8}},
            h('div',{style:{fontSize:12,color:'var(--muted)',marginBottom:5}},area),

  }

  return h(Fragment,null,
    h('div',{className:'grid g4',style:{marginBottom:20}},

        {label:'Called Out',value:workers.filter(w=>w.status==='Called Out').length,c:'var(--red)'},

        {label:'Call-out Risk',value:workers.filter(w=>w.callouts>=3).length,c:'var(--amber)'},

        h('div',{className:'highlight-chip',style:{marginBottom:16,borderColor:'rgba(239,68,68,.3)'}},

// ── AI ASSISTANT ──────────────────────────────────────────────────────────────
const SYS=`You are Inperium AI, the policy-aware facilities management assistant for DSC Solutions. Pod 3 covers Harrisburg/Lancaster corridor. Cerberus SOP tiers: A=Critical/Emergency, B=Daily Ops, C=Weekly, D=Scheduled Maintenance. Call-out policy: 3+ = verbal coaching, 5+ = written warning, 7+ = PIP within rolling 90 days. Always lead with coverage solution first, then documentation. Alan Kaufman is Managing Director. Sharlene is Fleet Manager. Be direct and operational. Keep responses concise.`;

function AIAssistant(){
  const [msgs,setMsgs]=useState([{role:'assistant',text:"Hey — I'm Inperium AI. Briefed on Cerberus SOPs, Pod 3 accounts, call-out policy, and ticket protocols. What do you need?"}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[msgs,loading]);

  async function send(){
    if(!input.trim()||loading)return;
    const txt=input.trim();setInput('');
    const nm=[...msgs,{role:'user',text:txt}];
    setMsgs(nm);setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,
          messages:nm.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.text}))
        })
      });
      const data=await res.json();
      const reply=data.content&&data.content.find(b=>b.type==='text')?data.content.find(b=>b.type==='text').text:'No response.';
      setMsgs(p=>[...p,{role:'assistant',text:reply}]);
    }catch(e){
      setMsgs(p=>[...p,{role:'assistant',text:'Connection error — check network or API key.'}]);
    }
    setLoading(false);
  }

  const QP=["Elton Craig has 4 call-outs — what's our policy?","Draft a Tier A SOP for biohazard cleanup","Satisfaction at Armstrong dropped to 79 — recommended actions?","What should I check on a walkthrough for Commonwealth PA?"];

  return h('div',{style:{display:'flex',flexDirection:'column',height:'calc(100vh - 140px)'}},
    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}},
      QP.map(q=>h('button',{key:q,className:'btn btn-ghost btn-sm',style:{fontSize:11},onClick:()=>setInput(q)},q))
    ),
    h('div',{className:'card',style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      h('div',{style:{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:14,paddingBottom:8}},
        msgs.map((m,i)=>h('div',{key:i,className:'chat-msg '+(m.role==='user'?'user':'')},
          m.role==='assistant'&&h('div',{style:{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,var(--accent),var(--purple))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
            ico('ti-sparkles',{fontSize:15,color:'#fff'})
          ),
          h('div',{className:'chat-bubble',style:{whiteSpace:'pre-wrap'}},m.text)
        )),
        loading&&h('div',{className:'chat-msg'},
          h('div',{style:{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,var(--accent),var(--purple))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},ico('ti-sparkles',{fontSize:15,color:'#fff'})),
          h('div',{className:'chat-bubble'},h('div',{className:'typing-dots'},h('span'),h('span'),h('span')))
        ),
        h('div',{ref:endRef})
      ),
      h('div',{style:{display:'flex',gap:8,marginTop:12}},
        h('textarea',{className:'chat-input',placeholder:'Ask about SOPs, call-out policy, satisfaction scores...',value:input,rows:1,
          onChange:e=>setInput(e.target.value),
          onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}),
        h('button',{className:'btn btn-primary',onClick:send,disabled:!input.trim()||loading,style:{height:42,alignSelf:'flex-end'}},ico('ti-send'))
      )
    )
  );
}
